<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONMEBOL - Confederation Sudamericaine de Football</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --conmebol-primary: #ee2737;
            --conmebol-secondary: #ffa500;
            --conmebol-yellow: #ffd700;
            --bg-dark: #0a0e1a;
            --bg-card: #1a1f2e;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            background: linear-gradient(135deg, #ee2737 0%, #ffa500 50%, #ffd700 100%);
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 20px rgba(238, 39, 55, 0.3);
            position: relative;
        }

        .back-button {
            position: absolute;
            left: 2rem;
            top: 50%;
            transform: translateY(-50%);
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            border-radius: 12px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-50%) translateX(-5px);
        }

        .header-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .header-logo img {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 12px;
            padding: 10px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.95;
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        .stats-container {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .stat-box {
            background: linear-gradient(135deg, #ee2737 0%, #d42030 100%);
            color: white;
            padding: 1.5rem 2.5rem;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(238, 39, 55, 0.3);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 1rem;
            opacity: 0.95;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .country-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .country-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ee2737 0%, #ffa500 50%, #ffd700 100%);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .country-card:hover::before {
            transform: scaleX(1);
        }

        .country-card:hover {
            transform: translateY(-8px);
            border-color: #ee2737;
            box-shadow: 0 12px 40px rgba(238, 39, 55, 0.3);
        }

        .country-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .country-code {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ee2737 0%, #d42030 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
        }

        .country-flag {
            font-size: 2.5rem;
        }

        .country-info {
            flex: 1;
        }

        .country-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.3rem;
        }

        .country-abbr {
            font-size: 0.85rem;
            color: #ee2737;
            font-weight: 600;
        }

        .country-details {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin: 0.3rem 0;
        }

        .detail-label {
            font-weight: 600;
            color: var(--text-primary);
        }

        .country-app-link {
            display: block;
            margin-top: 1rem;
            padding: 0.8rem;
            background: linear-gradient(135deg, #ee2737 0%, #d42030 100%);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .country-app-link:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(238, 39, 55, 0.4);
        }

        .footer {
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
            background: var(--bg-card);
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .back-button {
                position: static;
                transform: none;
                margin-bottom: 1rem;
                display: inline-flex;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .stat-box {
                padding: 1rem 1.5rem;
            }

            .stat-number {
                font-size: 2rem;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/index.html" class="back-button">
            <i class="fas fa-arrow-left"></i> Retour
        </a>
        <div class="header-logo">
            <span style="font-size: 4rem;">🌎</span>
        </div>
        <h1>CONMEBOL - Confederation Sudamericaine de Football</h1>
        <p>10 Associations Membres • Fondee en 1916</p>
    </div>

    <div class="container">
        <div class="stats-container">
            <div class="stat-box">
                <div class="stat-number">10</div>
                <div class="stat-label">Associations</div>
            </div>
            <div class="stat-box">
                <div class="stat-number">1916</div>
                <div class="stat-label">Fondation</div>
            </div>
            <div class="stat-box">
                <div class="stat-number">47</div>
                <div class="stat-label">Copa America</div>
            </div>
        </div>

        <div id="conmebol-grid" class="grid"></div>
    </div>

    <div class="footer">
        <p>&copy; 2026 PaieCashFan - Tous droits reserves</p>
        <p style="margin-top: 0.5rem; font-size: 0.9rem;">Paiement crypto pour tous les fans de sport</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script>
        // Donnees CONMEBOL completes (10 pays)
        const conmebolData = [
            {
                name: 'Argentine',
                code: 'ARG',
                flag: '🇦🇷',
                president: 'Claudio Tapia',
                founded: '1893',
                conmebolMember: '1916'
            },
            {
                name: 'Bolivie',
                code: 'BOL',
                flag: '🇧🇴',
                president: 'Fernando Costa',
                founded: '1925',
                conmebolMember: '1926'
            },
            {
                name: 'Bresil',
                code: 'BRA',
                flag: '🇧🇷',
                president: 'Ednaldo Rodrigues',
                founded: '1914',
                conmebolMember: '1916'
            },
            {
                name: 'Chili',
                code: 'CHI',
                flag: '🇨🇱',
                president: 'Pablo Milad',
                founded: '1895',
                conmebolMember: '1916'
            },
            {
                name: 'Colombie',
                code: 'COL',
                flag: '🇨🇴',
                president: 'Ramon Jesurun',
                founded: '1924',
                conmebolMember: '1936'
            },
            {
                name: 'Equateur',
                code: 'ECU',
                flag: '🇪🇨',
                president: 'Francisco Egas',
                founded: '1925',
                conmebolMember: '1927'
            },
            {
                name: 'Paraguay',
                code: 'PAR',
                flag: '🇵🇾',
                president: 'Robert Harrison',
                founded: '1906',
                conmebolMember: '1921'
            },
            {
                name: 'Perou',
                code: 'PER',
                flag: '🇵🇪',
                president: 'Agustin Lozano',
                founded: '1922',
                conmebolMember: '1925'
            },
            {
                name: 'Uruguay',
                code: 'URU',
                flag: '🇺🇾',
                president: 'Ignacio Alonso',
                founded: '1900',
                conmebolMember: '1916'
            },
            {
                name: 'Venezuela',
                code: 'VEN',
                flag: '🇻🇪',
                president: 'Jorge Gimenez',
                founded: '1926',
                conmebolMember: '1952'
            }
        ];

        function createCountryCard(country) {
            return `
                <div class="country-card">
                    <div class="country-header">
                        <div class="country-code">${country.code}</div>
                        <div class="country-flag">${country.flag}</div>
                        <div class="country-info">
                            <div class="country-name">${country.name}</div>
                            <div class="country-abbr">${country.code}</div>
                        </div>
                    </div>
                    <div class="country-details">
                        <div class="detail-row">
                            <span class="detail-label">President:</span>
                            <span>${country.president}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Fondation:</span>
                            <span>${country.founded}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Membre CONMEBOL:</span>
                            <span>${country.conmebolMember}</span>
                        </div>
                    </div>
                    <a href="/club.html?club=${country.code.toLowerCase()}&name=${encodeURIComponent(country.name)}&fed=CONMEBOL" class="country-app-link">
                        <i class="fas fa-rocket"></i> Voir l'application
                    </a>
                </div>
            `;
        }

        function renderCountries() {
            const grid = document.getElementById('conmebol-grid');
            grid.innerHTML = conmebolData.map(createCountryCard).join('');
        }

        // Initial render
        window.addEventListener('DOMContentLoaded', () => {
            renderCountries();
        });
    </script>
</body>
</html>
