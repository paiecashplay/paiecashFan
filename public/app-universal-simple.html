<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">PaieCashFan - Club</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #1abc9c;
            --secondary: #6b5dd3;
            --loto-orange: #f59e0b;
            --dark-bg: #0D0D40;
            --card-bg: #1a1a2e;
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --success: #10b981;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.1);
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1a2332 100%);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        /* Header */
        .header {
            background: rgba(13, 13, 64, 0.95);
            backdrop-filter: blur(20px);
            padding: 20px 30px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .club-badge {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .club-logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }
        
        .club-info h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 4px;
        }
        
        .club-info p {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .header-actions {
            display: flex;
            gap: 15px;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26, 188, 156, 0.4);
        }
        
        .btn-live {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            animation: pulse-live 2s infinite;
        }
        
        @keyframes pulse-live {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            50% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
        }
        
        .btn-live:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.6);
        }
        
        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        /* LOTO Section */
        .loto-section {
            background: linear-gradient(135deg, var(--loto-orange), #d97706);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 30px rgba(245, 158, 11, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .loto-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }
        
        .loto-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
        }
        
        .loto-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .loto-icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            animation: rotate 3s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .loto-title h2 {
            font-size: 28px;
            font-weight: 800;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }
        
        .loto-subtitle {
            font-size: 16px;
            opacity: 0.95;
        }
        
        .loto-stats {
            text-align: right;
        }
        
        .loto-stat {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
        }
        
        .loto-jackpot {
            font-size: 32px;
            font-weight: 800;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }
        
        /* Price Options */
        .price-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        
        .price-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .price-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        
        .price-card.selected {
            background: rgba(255, 255, 255, 0.3);
            border-color: white;
        }
        
        .price-value {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        
        .price-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        
        .price-chances {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .loto-cta {
            background: rgba(255, 255, 255, 0.95);
            color: var(--loto-orange);
            padding: 15px 40px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
            width: 100%;
        }
        
        .loto-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            background: white;
        }
        
        /* Events Calendar */
        .events-section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .section-title {
            font-size: 24px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .section-title i {
            color: var(--primary);
        }
        
        .filter-tabs {
            display: flex;
            gap: 10px;
        }
        
        .filter-tab {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .filter-tab:hover,
        .filter-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        /* Event Cards */
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .event-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--border);
        }
        
        .event-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            border-color: var(--primary);
        }
        
        .event-date {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            color: var(--primary);
            font-weight: 600;
        }
        
        .event-date i {
            font-size: 18px;
        }
        
        .event-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .event-description {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 15px;
            line-height: 1.5;
        }
        
        .event-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }
        
        .event-prize {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--loto-orange);
            font-weight: 700;
        }
        
        .event-participants {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        /* Share Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            position: relative;
        }
        
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text);
            font-size: 24px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }
        
        .modal-close:hover {
            opacity: 1;
        }
        
        .modal-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .share-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .share-btn {
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 16px;
        }
        
        .share-btn:hover {
            transform: translateY(-2px);
        }
        
        .share-btn.facebook {
            background: #1877f2;
            color: white;
        }
        
        .share-btn.twitter {
            background: #1da1f2;
            color: white;
        }
        
        .share-btn.whatsapp {
            background: #25d366;
            color: white;
        }
        
        .share-btn.telegram {
            background: #0088cc;
            color: white;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .price-options {
                grid-template-columns: 1fr;
            }
            
            .events-grid {
                grid-template-columns: 1fr;
            }
            
            .loto-header {
                flex-direction: column;
                text-align: center;
            }
            
            .loto-stats {
                text-align: center;
                margin-top: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="club-badge">
                <div class="club-logo" id="clubLogo">
                    <i class="fas fa-futbol"></i>
                </div>
                <div class="club-info">
                    <h1 id="clubName">Club</h1>
                    <p id="clubLeague">Ligue</p>
                </div>
            </div>
            
            <div class="header-actions">
                <button class="btn btn-live" onclick="goToLive()">
                    <i class="fas fa-video"></i> Live Stream
                </button>
                <button class="btn btn-primary" onclick="goToWallet()">
                    <i class="fas fa-wallet"></i> Wallet
                </button>
            </div>
        </div>
    </header>
    
    <!-- Container -->
    <div class="container">
        <!-- LOTO Section -->
        <section class="loto-section">
            <div class="loto-header">
                <div class="loto-title">
                    <div class="loto-icon">
                        <i class="fas fa-dice"></i>
                    </div>
                    <div>
                        <h2>LOTO PaieCashFan</h2>
                        <p class="loto-subtitle">Tentez votre chance chaque jour !</p>
                    </div>
                </div>
                
                <div class="loto-stats">
                    <div class="loto-stat">Jackpot du jour</div>
                    <div class="loto-jackpot">1 000 EUR</div>
                </div>
            </div>
            
            <div class="price-options">
                <div class="price-card" onclick="selectPrice(1)">
                    <div class="price-value">1€</div>
                    <div class="price-label">Ticket Simple</div>
                    <div class="price-chances">1 chance sur 1000</div>
                </div>
                
                <div class="price-card selected" onclick="selectPrice(5)">
                    <div class="price-value">5€</div>
                    <div class="price-label">Ticket Premium</div>
                    <div class="price-chances">5 chances sur 1000</div>
                </div>
                
                <div class="price-card" onclick="selectPrice(20)">
                    <div class="price-value">20€</div>
                    <div class="price-label">Ticket VIP</div>
                    <div class="price-chances">20 chances sur 1000</div>
                </div>
            </div>
            
            <button class="loto-cta" onclick="playLoto()">
                <i class="fas fa-ticket-alt"></i> Jouer Maintenant
            </button>
        </section>
        
        <!-- Events Calendar -->
        <section class="events-section">
            <div class="section-header">
                <h2 class="section-title">
                    <i class="fas fa-calendar-alt"></i>
                    Événements à Venir
                </h2>
                
                <div class="filter-tabs">
                    <button class="filter-tab active" onclick="filterEvents('all')">Tous</button>
                    <button class="filter-tab" onclick="filterEvents('week')">Cette semaine</button>
                    <button class="filter-tab" onclick="filterEvents('month')">Ce mois</button>
                </div>
            </div>
            
            <div class="events-grid" id="eventsContainer">
                <!-- Events will be dynamically loaded -->
            </div>
        </section>
    </div>
    
    <!-- Share Modal -->
    <div class="modal" id="shareModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeShareModal()">
                <i class="fas fa-times"></i>
            </button>
            
            <h3 class="modal-title">Partager sur les réseaux</h3>
            
            <div class="share-options">
                <button class="share-btn facebook" onclick="shareOnFacebook()">
                    <i class="fab fa-facebook"></i>
                    Facebook
                </button>
                
                <button class="share-btn twitter" onclick="shareOnTwitter()">
                    <i class="fab fa-twitter"></i>
                    Twitter
                </button>
                
                <button class="share-btn whatsapp" onclick="shareOnWhatsApp()">
                    <i class="fab fa-whatsapp"></i>
                    WhatsApp
                </button>
                
                <button class="share-btn telegram" onclick="shareOnTelegram()">
                    <i class="fab fa-telegram"></i>
                    Telegram
                </button>
            </div>
        </div>
    </div>
    
    <script>
        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const clubName = urlParams.get('club') || 'Club';
        const clubLogo = urlParams.get('logo') || '⚽';
        const sport = urlParams.get('sport') || 'Football';
        const league = urlParams.get('league') || 'Ligue';
        
        // Set club info
        document.getElementById('clubName').textContent = clubName;
        document.getElementById('clubLeague').textContent = `${sport} - ${league}`;
        document.getElementById('clubLogo').innerHTML = clubLogo;
        document.getElementById('pageTitle').textContent = `${clubName} - PaieCashFan`;
        
        // Selected price
        let selectedPrice = 5;
        
        // Select price
        function selectPrice(price) {
            selectedPrice = price;
            
            // Update UI
            document.querySelectorAll('.price-card').forEach(card => {
                card.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
        }
        
        // Play LOTO
        let currentEventId = null;
        
        function playLoto(eventId = null) {
            currentEventId = eventId;
            const url = `/loto.html?club=${clubName}&price=${selectedPrice}${eventId ? `&event=${eventId}` : ''}`;
            window.location.href = url;
        }
        
        // Wallet
        function goToWallet() {
            window.location.href = '/wallet.html';
        }
        
        // Live Stream (NEW - Tencent TRTC)
        function goToLive() {
            // Generate user ID
            const userId = `${clubName.toLowerCase()}_${Math.random().toString(36).substring(2, 8)}`;
            
            // Redirect to TRTC live page
            const url = `/trtc-live.html?club=${encodeURIComponent(clubName)}&logo=${encodeURIComponent(clubLogo)}&user=${userId}`;
            window.location.href = url;
        }
        
        // Generate upcoming events (next 30 days)
        function generateEvents() {
            const events = [];
            const today = new Date();
            
            // Generate 10 upcoming events
            for (let i = 1; i <= 10; i++) {
                const eventDate = new Date(today);
                eventDate.setDate(today.getDate() + i);
                
                const prizes = ['Maillot dédicacé', 'NFT Exclusif', '100 PCC', 'Billet VIP', 'Pack Famille', 'Weekend Club'];
                const prizeValues = ['300€', '150€', '100€', '250€', '400€', '600€'];
                
                events.push({
                    id: `event-${i}`,
                    date: eventDate,
                    title: `Tirage ${eventDate.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' })}`,
                    description: `Gagnez un ${prizes[Math.floor(Math.random() * prizes.length)]} d'une valeur de ${prizeValues[Math.floor(Math.random() * prizeValues.length)]}`,
                    prize: prizeValues[Math.floor(Math.random() * prizeValues.length)],
                    participants: Math.floor(Math.random() * 500) + 100
                });
            }
            
            return events;
        }
        
        // Render events
        function renderEvents(events) {
            const container = document.getElementById('eventsContainer');
            
            container.innerHTML = events.map(event => `
                <div class="event-card" onclick="playLoto('${event.id}')">
                    <div class="event-date">
                        <i class="fas fa-calendar-day"></i>
                        <span>${event.date.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' })}</span>
                    </div>
                    
                    <h3 class="event-title">${event.title}</h3>
                    
                    <p class="event-description">${event.description}</p>
                    
                    <div class="event-footer">
                        <div class="event-prize">
                            <i class="fas fa-trophy"></i>
                            <span>${event.prize}</span>
                        </div>
                        
                        <div class="event-participants">
                            <i class="fas fa-users"></i>
                            <span>${event.participants}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // Filter events
        let allEvents = [];
        
        function filterEvents(filter) {
            // Update tabs
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
            
            const today = new Date();
            let filtered = [];
            
            if (filter === 'all') {
                filtered = allEvents;
            } else if (filter === 'week') {
                const nextWeek = new Date(today);
                nextWeek.setDate(today.getDate() + 7);
                filtered = allEvents.filter(e => e.date <= nextWeek);
            } else if (filter === 'month') {
                const nextMonth = new Date(today);
                nextMonth.setMonth(today.getMonth() + 1);
                filtered = allEvents.filter(e => e.date <= nextMonth);
            }
            
            renderEvents(filtered);
        }
        
        // Share modal
        function closeShareModal() {
            document.getElementById('shareModal').classList.remove('active');
        }
        
        function openShareModal() {
            document.getElementById('shareModal').classList.add('active');
        }
        
        function shareOnFacebook() {
            const url = encodeURIComponent(window.location.href);
            const text = encodeURIComponent(`Rejoignez-moi sur PaieCashFan ${clubName} pour tenter de gagner au LOTO !`);
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${text}`, '_blank');
        }
        
        function shareOnTwitter() {
            const url = encodeURIComponent(window.location.href);
            const text = encodeURIComponent(`Rejoignez-moi sur PaieCashFan ${clubName} pour tenter de gagner au LOTO !`);
            window.open(`https://twitter.com/intent/tweet?url=${url}&text=${text}`, '_blank');
        }
        
        function shareOnWhatsApp() {
            const url = encodeURIComponent(window.location.href);
            const text = encodeURIComponent(`Rejoignez-moi sur PaieCashFan ${clubName} pour tenter de gagner au LOTO ! ${window.location.href}`);
            window.open(`https://wa.me/?text=${text}`, '_blank');
        }
        
        function shareOnTelegram() {
            const url = encodeURIComponent(window.location.href);
            const text = encodeURIComponent(`Rejoignez-moi sur PaieCashFan ${clubName} pour tenter de gagner au LOTO !`);
            window.open(`https://t.me/share/url?url=${url}&text=${text}`, '_blank');
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            allEvents = generateEvents();
            renderEvents(allEvents);
        });
    </script>
</body>
</html>
