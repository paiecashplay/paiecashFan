<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaieCashFan - National 3 2025/2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/i18n.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --turquoise: #1abc9c;
            --purple: #6b5dd3;
            --dark-navy: #1a1d2e;
            --dark-card: #252837;
            --green: #10b981;
            --text-white: #ffffff;
            --text-gray: #8b93b0;
            --orange: #f97316;
            --blue: #3b82f6;
            --indigo: #6366f1;
            --violet: #8b5cf6;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--turquoise) 0%, var(--purple) 100%);
            color: var(--text-white);
            min-height: 100vh;
        }
        
        /* Header */
        .header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo-text {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-white);
        }
        
        .lang-selector {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 8px;
            color: var(--text-white);
            font-weight: 600;
            cursor: pointer;
        }
        
        .auth-buttons {
            display: flex;
            gap: 15px;
        }
        
        .btn {
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 14px;
        }
        
        .btn-login {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: var(--text-white);
        }
        
        .btn-signup {
            background: var(--green);
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        /* Hero Section */
        .hero {
            text-align: center;
            padding: 60px 40px 40px;
        }
        
        .hero h1 {
            font-size: 56px;
            font-weight: 900;
            margin-bottom: 15px;
        }
        
        .hero p {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
        }
        
        /* Search Bar */
        .search-container {
            max-width: 1000px;
            margin: 0 auto 50px;
            padding: 0 20px;
        }
        
        .search-bar {
            background: var(--dark-navy);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 18px 24px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }
        
        .search-bar i {
            color: var(--text-gray);
            margin-right: 15px;
            font-size: 18px;
        }
        
        .search-bar input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-white);
            font-size: 16px;
            outline: none;
        }
        
        .search-bar input::placeholder {
            color: var(--text-gray);
        }
        
        /* Navigation Tabs */
        .nav-tabs {
            max-width: 1200px;
            margin: 0 auto 40px;
            padding: 0 40px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .tab {
            padding: 12px 24px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-white);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .tab.active {
            background: linear-gradient(135deg, var(--violet), #7c3aed);
            border-color: var(--violet);
        }
        
        .tab:hover {
            transform: translateY(-2px);
        }
        
        /* League Selector */
        .league-selector {
            max-width: 1200px;
            margin: 0 auto 30px;
            padding: 0 40px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .league-btn {
            padding: 10px 24px;
            border-radius: 25px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-white);
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        
        .league-btn:hover {
            transform: translateY(-2px);
            border-color: var(--violet);
        }
        
        .league-btn.active {
            background: linear-gradient(135deg, var(--violet), #7c3aed);
            border-color: var(--violet);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
        }
        
        /* Content Section */
        .content-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px 60px;
        }
        
        .section-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .section-title img {
            width: 40px;
            height: 28px;
        }
        
        .section-subtitle {
            font-size: 16px;
            color: var(--text-gray);
            margin-top: 10px;
            font-weight: 500;
        }
        
        /* Clubs Grid */
        .clubs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .club-card {
            background: var(--dark-card);
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: relative;
        }
        
        .club-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }
        
        .club-position {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(135deg, var(--violet), #7c3aed);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(139, 92, 246, 0.3);
        }
        
        .club-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .club-logo {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--violet), #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }
        
        .club-info h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-white);
            margin-bottom: 5px;
        }
        
        .club-info p {
            font-size: 13px;
            color: var(--text-gray);
        }
        
        .club-stats {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .club-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-gray);
        }
        
        .club-stat i {
            color: var(--violet);
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-gray);
        }
        
        .no-results {
            text-align: center;
            padding: 60px;
            color: var(--text-gray);
        }
        
        /* Footer */
        .footer {
            background: var(--dark-navy);
            padding: 40px;
            text-align: center;
            color: var(--text-gray);
            margin-top: 80px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 36px;
            }
            
            .league-selector {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo-section">
            <h1 class="logo-text" data-i18n="app.name">PaieCashFan</h1>
            <div id="languageSelector"></div>
        </div>
        
        <div class="auth-buttons">
            <button class="btn btn-login" onclick="goToLogin()">
                <i class="fas fa-sign-in-alt"></i> <span data-i18n="auth.login">Se connecter</span>
            </button>
            <button class="btn btn-signup" onclick="goToSignup()">
                <i class="fas fa-user-plus"></i> <span data-i18n="auth.signup">Inscription</span>
            </button>
        </div>
    </header>
    
    <!-- Hero Section -->
    <section class="hero">
        <h1>National 3</h1>
        <p>Championnat de France de Football - Saison 2025/2026</p>
    </section>
    
    <!-- Search Bar -->
    <div class="search-container">
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" data-i18n-placeholder="search.placeholder" placeholder="Rechercher un club, une ville...">
        </div>
    </div>
    
    <!-- League Selector -->
    <div class="league-selector">
        <button class="league-btn" onclick="goToLigue1()">
            <i class="fas fa-trophy"></i>
            <span>Ligue 1</span>
        </button>
        <button class="league-btn" onclick="goToLigue2()">
            <i class="fas fa-award"></i>
            <span>Ligue 2</span>
        </button>
        <button class="league-btn" onclick="goToNational()">
            <i class="fas fa-medal"></i>
            <span>National</span>
        </button>
        <button class="league-btn" onclick="goToNational2()">
            <i class="fas fa-ribbon"></i>
            <span>National 2</span>
        </button>
        <button class="league-btn active">
            <i class="fas fa-certificate"></i>
            <span>National 3</span>
        </button>
    </div>
    
    <!-- Navigation Tabs -->
    <nav class="nav-tabs">
        <button class="tab active" data-tab="france">
            <i class="fas fa-futbol"></i> <span data-i18n="tabs.football_france">Football France</span>
        </button>
        <button class="tab" data-tab="sports">
            <i class="fas fa-trophy"></i> <span data-i18n="tabs.other_sports">Autres Sports</span>
        </button>
        <button class="tab" data-tab="europe">
            <i class="fas fa-globe-europe"></i> <span data-i18n="tabs.european_football">EU Football Europeen</span>
        </button>
        <button class="tab" data-tab="federations">
            <i class="fas fa-flag"></i> <span data-i18n="tabs.federations">Federations</span>
        </button>
        <button class="tab" data-tab="events">
            <i class="fas fa-star"></i> <span data-i18n="tabs.events">Evenements</span>
        </button>
    </nav>
    
    <!-- Content Section -->
    <section class="content-section">
        <h2 class="section-title">
            <i class="fas fa-flag" style="color: var(--violet);"></i>
            <span>National 3 - Saison 2025/2026</span>
        </h2>
        <div class="section-subtitle">
            <i class="fas fa-info-circle"></i> 14 clubs au total - Classement actuel (Groupe Sud-Ouest)
        </div>
        
        <div id="clubsContainer" class="clubs-grid">
            <div class="loading">
                <i class="fas fa-spinner fa-spin" style="font-size: 32px; margin-bottom: 10px;"></i>
                <p data-i18n="loading">Chargement...</p>
            </div>
        </div>
    </section>
    
    <!-- Footer -->
    <footer class="footer">
        <p data-i18n="footer.copyright">&copy; 2026 PaieCashFan - Tous droits reserves</p>
        <p style="margin-top: 10px; font-size: 14px;" data-i18n="footer.crypto_accepted">Paiements cryptos acceptes : BTC, ETH, USDC, USDT</p>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script src="/static/i18n.js"></script>
    <script>
        const API_BASE = window.location.origin;
        
        // French National 3 clubs - Saison 2025/2026 (Groupe Sud-Ouest)
        const national3Clubs = [
            { id: 'canet', name: 'Canet Roussillon FC', city: 'Canet-en-Roussillon', fans: '3K', icon: 'fa-umbrella-beach', position: 1 },
            { id: 'tarbes', name: 'Tarbes Pyrenees Foot', city: 'Tarbes', fans: '4K', icon: 'fa-mountain', position: 2 },
            { id: 'onet', name: 'Onet-Le-Chateau', city: 'Onet-le-Chateau', fans: '2K', icon: 'fa-castle', position: 3 },
            { id: 'anglet', name: 'Anglet Genets FC', city: 'Anglet', fans: '3K', icon: 'fa-wave-square', position: 4 },
            { id: 'colomiers', name: 'US Colomiers', city: 'Colomiers', fans: '4K', icon: 'fa-rocket', position: 5 },
            { id: 'arcachon', name: 'FC Arcachon', city: 'Arcachon', fans: '3K', icon: 'fa-sailboat', position: 6 },
            { id: 'castanet', name: 'Castanet Tolosan FC', city: 'Castanet-Tolosan', fans: '2K', icon: 'fa-tree', position: 7 },
            { id: 'pau2', name: 'Pau FC B', city: 'Pau', fans: '2K', icon: 'fa-mountain-city', position: 8 },
            { id: 'agde', name: 'Agde FC', city: 'Agde', fans: '3K', icon: 'fa-sun', position: 9 },
            { id: 'toulouse2', name: 'Toulouse FC B', city: 'Toulouse', fans: '3K', icon: 'fa-heart', position: 10 },
            { id: 'legecapferret', name: 'Lege-Cap-Ferret', city: 'Lege-Cap-Ferret', fans: '2K', icon: 'fa-anchor', position: 11 },
            { id: 'blagnac', name: 'Blagnac FC', city: 'Blagnac', fans: '3K', icon: 'fa-plane', position: 12 },
            { id: 'alberes', name: 'Alberes Argeles', city: 'Argeles-sur-Mer', fans: '2K', icon: 'fa-hills-cliff', position: 13 },
            { id: 'cestas', name: 'Cestas Sag', city: 'Cestas', fans: '2K', icon: 'fa-seedling', position: 14 }
        ];
        
        let allClubs = [...national3Clubs];
        let filteredClubs = [...national3Clubs];
        
        // Render clubs
        function renderClubs(clubs) {
            const container = document.getElementById('clubsContainer');
            
            if (clubs.length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search" style="font-size: 48px; margin-bottom: 15px; color: var(--text-gray);"></i>
                        <p data-i18n="search.no_results">Aucun resultat trouve</p>
                    </div>
                `;
                if (window.i18n) i18n.translatePage();
                return;
            }
            
            container.innerHTML = clubs.map(club => `
                <div class="club-card" onclick="goToClub('${club.id}')">
                    <div class="club-position">${club.position}</div>
                    <div class="club-header">
                        <div class="club-logo">
                            <i class="fas ${club.icon}"></i>
                        </div>
                        <div class="club-info">
                            <h3>${club.name}</h3>
                            <p><i class="fas fa-map-marker-alt"></i> ${club.city}</p>
                        </div>
                    </div>
                    <div class="club-stats">
                        <div class="club-stat">
                            <i class="fas fa-users"></i>
                            <span>${club.fans}</span>
                        </div>
                        <div class="club-stat">
                            <i class="fas fa-trophy"></i>
                            <span data-i18n="club.follow">Suivre</span>
                        </div>
                    </div>
                </div>
            `).join('');
            
            if (window.i18n) i18n.translatePage();
        }
        
        // Search functionality
        function handleSearch(query) {
            const searchTerm = query.toLowerCase().trim();
            
            if (!searchTerm) {
                filteredClubs = [...allClubs];
            } else {
                filteredClubs = allClubs.filter(club => 
                    club.name.toLowerCase().includes(searchTerm) ||
                    club.city.toLowerCase().includes(searchTerm)
                );
            }
            
            renderClubs(filteredClubs);
        }
        
        // Navigate to club
        function goToClub(clubId) {
            const club = allClubs.find(c => c.id === clubId);
            if (club) {
                window.location.href = `/app-universal-simple.html?club=${encodeURIComponent(club.name)}&logo=⚽&sport=Football&league=National+3`;
            }
        }
        
        // Navigate to Ligue 1
        function goToLigue1() {
            window.location.href = '/index-loto.html';
        }
        
        // Navigate to Ligue 2
        function goToLigue2() {
            window.location.href = '/index-loto-ligue2.html';
        }
        
        // Navigate to National
        function goToNational() {
            window.location.href = '/index-loto-national.html';
        }
        
        // Navigate to National 2
        function goToNational2() {
            window.location.href = '/index-loto-national2.html';
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            // Initialize i18n
            if (window.i18n) {
                await i18n.init();
                
                // Add language selector
                const langSelector = document.getElementById('languageSelector');
                if (langSelector) {
                    langSelector.appendChild(i18n.createLanguageSelector());
                }
                
                // Listen for language changes
                window.addEventListener('languageChanged', () => {
                    i18n.translatePage();
                });
            }
            
            // Render clubs
            renderClubs(filteredClubs);
            
            // Setup search
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    handleSearch(e.target.value);
                });
            }
            
            // Setup tabs
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const tabType = tab.dataset.tab;
                    
                    if (tabType === 'france') {
                        // Stay on current page (National 3)
                        tabs.forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                    } else {
                        navigateToTab(tabType);
                    }
                });
            });
        });
        
        // Auth functions
        function goToLogin() {
            alert('Fonctionnalite Login en cours de developpement');
        }
        
        function goToSignup() {
            alert('Fonctionnalite Inscription en cours de developpement');
        }
        
        // Navigation tabs functions
        function navigateToTab(tabType) {
            if (tabType === 'sports') {
                alert('Autres Sports - En cours de developpement');
            } else if (tabType === 'europe') {
                alert('Football Europeen - En cours de developpement');
            } else if (tabType === 'federations') {
                window.location.href = '/index.html';
            } else if (tabType === 'events') {
                alert('Evenements - En cours de developpement');
            }
        }
    </script>
</body>
</html>
